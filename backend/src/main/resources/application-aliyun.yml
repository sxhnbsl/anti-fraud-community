# 阿里云内容安全配置
aliyun:
  # 阿里云AccessKey ID（通过环境变量 ALIYUN_ACCESS_KEY_ID 配置）
  accessKeyId: ${ALIYUN_ACCESS_KEY_ID:your-aliyun-access-key-id}

  # 阿里云AccessKey Secret（通过环境变量 ALIYUN_ACCESS_KEY_SECRET 配置）
  accessKeySecret: ${ALIYUN_ACCESS_KEY_SECRET:your-aliyun-access-key-secret}
  
  # 地域ID
  regionId: cn-shanghai
  
  # 内容安全服务Endpoint
  endpoint: green-cip.cn-shanghai.aliyuncs.com
  
  # 内容审核配置
  content-security:
    # 是否启用内容审核
    enabled: true
    
    # 审核场景
    scenes:
      post: "ugc_moderation_byllm"      # 帖子审核（UGC场景文本审核）
      comment: "ugc_moderation_byllm"   # 评论审核（UGC场景文本审核）
      
    # 风险等级阈值
    risk-threshold:
      pass: 0      # 通过阈值
      review: 50   # 人工审核阈值
      reject: 100  # 拒绝阈值
