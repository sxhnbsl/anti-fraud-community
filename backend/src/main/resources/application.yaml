spring:
  profiles:
    active: aliyun
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/anti_fraud_platform?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your-db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  port: 8080

# 自定义配置
jwt:
  secret: ${JWT_SECRET:your-jwt-secret}
  expiration: ${JWT_EXPIRATION:86400000}  # 24小时

# DeepSeek AI配置
deepseek:
  api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:2000}
  temperature: ${DEEPSEEK_TEMPERATURE:0.7}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.antifraud.model
  configuration:
    map-underscore-to-camel-case: true
